{% load static %}
<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Pro | Меню кошуу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg premium-navbar px-3 px-lg-4">
        <div class="container-fluid p-0">
            <div class="d-flex align-items-center gap-3">
                <div class="nav-logo"><i class="fas fa-coffee"></i></div>
                <div>
                    <span class="navbar-brand mb-0 d-block">Cafe Pro</span>
                    <small class="text-white-50">Меню кошуу</small>
                </div>
            </div>
            <div class="d-flex align-items-center text-white gap-3">
                <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-sm rounded-pill px-3">
                    <i class="fas fa-arrow-left me-1"></i>Артка
                </a>
                <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm rounded-pill px-3">
                    <i class="fas fa-sign-out-alt me-1"></i>Чыгуу
                </a>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="glass-card p-4">
                    <div class="mb-4">
                        <span class="section-kicker">SMART MENU</span>
                        <h4 class="mt-1"><i class="fas fa-utensils me-2"></i>Жаңы тамак кошуу</h4>
                    </div>

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Тамактын аты</label>
                            <input type="text" name="name" class="form-control premium-input" placeholder="Мис: Лагман" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Баасы (сом)</label>
                            <input type="number" name="price" class="form-control premium-input" placeholder="Мис: 250" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Категория</label>
                            <select name="category" class="form-select premium-input" required>
                                <option value="">Тандаңыз...</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}">{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Сүрөт</label>
                            <input type="file" name="image" class="form-control premium-input" accept="image/*">
                        </div>

                        <div class="mb-4">
                            <div class="form-check">
                                <input type="checkbox" name="is_available" class="form-check-input" id="available" checked>
                                <label class="form-check-label" for="available">Даяр (менюда көрүнсүн)</label>
                            </div>
                        </div>

                        <div class="d-flex gap-3">
                            <a href="{% url 'dashboard' %}" class="btn btn-outline-light rounded-pill px-4">
                                Жокко чыгаруу
                            </a>
                            <button type="submit" class="btn premium-btn rounded-pill px-4 text-white flex-grow-1">
                                <i class="fas fa-plus me-2"></i>Кошуу
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
